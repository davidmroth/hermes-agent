# =============================================================================
# Developer-local overrides
# =============================================================================
# Source volume mounts for hot-reload during development.
# This file is auto-merged by `docker compose up`.

services:
  hermes:
    environment:
      - GATEWAY_ALLOW_ALL_USERS=true
      - SIGNAL_ALLOW_ALL_USERS=true
    volumes:
      - .data/hermes:/opt/data
    extra_hosts:
      # Point to the actual IP of your llama.cpp server.
      # Change this if ai.local moves to a different IP.
      - "ai.local:192.168.87.153"
    depends_on:
      signal:
        condition: service_healthy

  signal:
    #ports:
    #  - "8081:8080" # ← optional: expose to host for manual testing / linking
    environment:
      - MODE=json-rpc # crucial: enables JSON-RPC daemon
      - PORT=8080
      # - SWAGGER_HOST=localhost:8081
      # Note: SIGNAL_CLI_OPTS flags (--ignore-stickers, --send-receipts) are
      # from the old bbernhard REST API wrapper and not supported by the
      # native ghcr.io/asamk/signal-cli image.
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
