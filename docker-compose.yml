# =============================================================================
# Hermes Agent — Docker Compose
# =============================================================================
# Multi-service stack: gateway (agent core), whatsapp-bridge, terminal-sandbox.
#
# Quick start:
#   docker compose build
#   docker compose up                                    # Start gateway + dashboard
#   open http://127.0.0.1:9119                          # Open dashboard
#   docker compose run --rm gateway hermes               # Interactive CLI
#   docker compose --profile whatsapp up                 # Include WhatsApp
#
# Config: API keys go in the project .env file (same as .env.example format).
# Persistent data (sessions, skills, memories) lives in the hermes_data volume.
#
# To import existing ~/.hermes config into the volume:
#   docker compose run --rm gateway cp -r /host-hermes/. /opt/data
# (after uncommenting the host-hermes mount below)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Gateway — Main agent service
  # Runs the messaging gateway (Telegram, Discord, Slack, Signal, etc.)
  # with embedded cron scheduler. Also usable for interactive CLI sessions.
  # ---------------------------------------------------------------------------
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: gateway
    environment:
      PYTHONUNBUFFERED: "1"
      # Terminal backend: "local" runs commands inside this container.
      # Change to "docker" + uncomment the docker socket volume below
      # for isolated sandbox execution via the terminal-sandbox service.
      TERMINAL_ENV: local
      TERMINAL_CWD: /workspace
      # Enable the gateway health/API endpoint for the dashboard container.
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      # Route Hermes through the OpenCode sidecar using the existing ACP
      # subprocess adapter. Override these in .env if you want a different
      # provider or ACP command.
      #HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-copilot-acp}
      #HERMES_MODEL: ${HERMES_MODEL:-claude-sonnet-4.6}
      #HERMES_COPILOT_ACP_COMMAND: ${HERMES_COPILOT_ACP_COMMAND:-docker}
      #HERMES_COPILOT_ACP_ARGS: "${HERMES_COPILOT_ACP_ARGS:-exec -i hermes-opencode opencode acp --cwd /workspace}"
    env_file:
      - path: .env
        required: false
    expose:
      - "8642"
    #depends_on:
    #  - opencode
    volumes:
      # Docker socket — required for the OpenCode ACP bridge and optional
      # terminal-sandbox support.
      #- /var/run/docker.sock:/var/run/docker.sock
      # --- Hot-reload: mount source directories ---
      - ./run_agent.py:/opt/hermes/run_agent.py
      - ./model_tools.py:/opt/hermes/model_tools.py
      - ./toolsets.py:/opt/hermes/toolsets.py
      - ./cli.py:/opt/hermes/cli.py
      - ./hermes_state.py:/opt/hermes/hermes_state.py
      - ./hermes_time.py:/opt/hermes/hermes_time.py
      - ./hermes_constants.py:/opt/hermes/hermes_constants.py
      - ./hermes_logging.py:/opt/hermes/hermes_logging.py
      - ./toolset_distributions.py:/opt/hermes/toolset_distributions.py
      - ./utils.py:/opt/hermes/utils.py
      - ./agent:/opt/hermes/agent
      - ./tools:/opt/hermes/tools
      - ./hermes_cli:/opt/hermes/hermes_cli
      - ./gateway:/opt/hermes/gateway
      - ./cron:/opt/hermes/cron
      - ./skills:/opt/hermes/skills
      - ./optional-skills:/opt/hermes/optional-skills
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"

  # ---------------------------------------------------------------------------
  # Dashboard — Browser UI for config, API keys, sessions, logs, and chat
  # Published on host loopback only: http://127.0.0.1:9119
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --no-open --insecure
    environment:
      PYTHONUNBUFFERED: "1"
      GATEWAY_HEALTH_URL: http://hermes:8642
      GATEWAY_HEALTH_TIMEOUT: "3"
      TERMINAL_ENV: local
      TERMINAL_CWD: /workspace
    env_file:
      - path: .env
        required: false
    depends_on:
      - hermes
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      # Workspace for the embedded dashboard chat/TUI.
      - .data/hermes:/opt/data
      - .data/hermes/workspace:/workspace
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"

  # ---------------------------------------------------------------------------
  # OpenCode — ACP sidecar backend for Hermes
  # Hermes reaches this container via `docker exec ... opencode acp --cwd
  # /workspace`, while the long-lived `serve` process keeps the sidecar running
  # and exposes OpenCode's HTTP API for manual attach/debugging.
  # ---------------------------------------------------------------------------
  opencode:
    image: ghcr.io/anomalyco/opencode
    container_name: hermes-opencode
    restart: unless-stopped
    command: ["serve", "--hostname", "0.0.0.0", "--port", "4096"]
    working_dir: /workspace
    env_file:
      - path: .env
        required: false
    volumes:
      - .data/hermes/workspace:/workspace
      - .data/opencode:/root
    ports:
      - "4096:4096"
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "10m"

  # ---------------------------------------------------------------------------
  # Terminal Sandbox — Isolated command execution environment
  # The gateway's terminal tool can `docker exec` into this container
  # instead of running commands in its own process.
  # Enable by setting TERMINAL_ENV=docker in the gateway service.
  # ---------------------------------------------------------------------------
  terminal-sandbox:
    image: nikolaik/python-nodejs:python3.11-nodejs20
    profiles:
      - sandbox
    restart: unless-stopped
    command: ["sleep", "infinity"]
    working_dir: /workspace
    volumes:
      - sandbox_workspace:/workspace
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
    security_opt:
      - no-new-privileges:true

volumes:
  hermes_data:
  sandbox_workspace:
