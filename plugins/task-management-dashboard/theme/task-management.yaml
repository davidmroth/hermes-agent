# Task Management - Hermes dashboard theme
#
# Copy this file to ~/.hermes/dashboard-themes/task-management.yaml and
# pair it with plugins/task-management-dashboard/ for the full productivity
# dashboard chrome. The theme stays intentionally readable: light canvas,
# dark text, quiet borders, and clear status accents.
name: task-management
label: "Task Management"
description: "Readable light productivity dashboard with task-board chrome"

palette:
  background: "#f4f7fb"
  midground: "#172033"
  foreground:
    hex: "#ffffff"
    alpha: 0.68
  warmGlow: "rgba(88, 132, 255, 0.14)"
  noiseOpacity: 0.08

typography:
  fontSans: '"Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
  fontMono: '"JetBrains Mono", "SFMono-Regular", Consolas, ui-monospace, monospace'
  fontDisplay: '"Roboto", ui-sans-serif, system-ui, sans-serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
  baseSize: "16px"
  lineHeight: "1.6"
  letterSpacing: "0"

layout:
  radius: "0.9rem"
  density: comfortable

layoutVariant: cockpit

assets:
  bg: "linear-gradient(135deg, #f7f9fe 0%, #eef4fb 46%, #f8fbf7 100%)"

componentStyles:
  card:
    background: "linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(250, 252, 255, 0.92) 100%)"
    boxShadow: "0 18px 45px -32px rgba(23, 32, 51, 0.36), inset 0 0 0 1px rgba(121, 136, 164, 0.16)"
  header:
    background: "rgba(250, 252, 255, 0.9)"
  sidebar:
    background: "linear-gradient(180deg, rgba(255, 255, 255, 0.82) 0%, rgba(245, 248, 252, 0.78) 100%)"
  tab:
    clipPath: "inset(0 round 14px)"
  backdrop:
    backgroundSize: "cover"
    backgroundPosition: "center"
    fillerOpacity: "1"
    fillerBlendMode: "normal"
  footer:
    background: "rgba(250, 252, 255, 0.78)"

colorOverrides:
  card: "#ffffff"
  cardForeground: "#172033"
  popover: "#ffffff"
  popoverForeground: "#172033"
  primary: "#3e69ff"
  primaryForeground: "#ffffff"
  secondary: "#e9eef7"
  secondaryForeground: "#25314a"
  muted: "#eef3f8"
  mutedForeground: "#667085"
  accent: "#12b886"
  accentForeground: "#ffffff"
  success: "#12b886"
  warning: "#f59f00"
  destructive: "#ef4444"
  destructiveForeground: "#ffffff"
  border: "rgba(121, 136, 164, 0.24)"
  input: "rgba(121, 136, 164, 0.28)"
  ring: "#3e69ff"

customCSS: |
  :root[data-layout-variant="cockpit"] body {
    background: #f4f7fb;
  }

  :root[data-layout-variant="cockpit"] {
    font-size: 16px;
  }

  :root[data-layout-variant="cockpit"] .font-mondwest,
  :root[data-layout-variant="cockpit"] .font-expanded {
    font-family: var(--theme-font-sans, ui-sans-serif, system-ui, sans-serif);
    letter-spacing: 0;
  }

  :root[data-layout-variant="cockpit"] .uppercase {
    text-transform: none;
  }

  :root[data-layout-variant="cockpit"] h1,
  :root[data-layout-variant="cockpit"] h2,
  :root[data-layout-variant="cockpit"] h3,
  :root[data-layout-variant="cockpit"] .text-sm {
    line-height: 1.45;
  }

  :root[data-layout-variant="cockpit"] header {
    color: #172033;
    box-shadow: 0 12px 36px -30px rgba(23, 32, 51, 0.45);
  }

  :root[data-layout-variant="cockpit"] header .tracking-\[0\.0525rem\] {
    font-size: 1rem;
    line-height: 1.05;
  }

  :root[data-layout-variant="cockpit"] header nav,
  :root[data-layout-variant="cockpit"] header a {
    border-radius: 999px;
  }

  :root[data-layout-variant="cockpit"] main > div,
  :root[data-layout-variant="cockpit"] [class*="bg-card"] {
    border-radius: var(--radius-lg);
  }

  :root[data-layout-variant="cockpit"] .border-border {
    border-color: rgba(121, 136, 164, 0.24);
  }

  :root[data-layout-variant="cockpit"] .text-muted-foreground {
    color: #667085;
  }

  :root[data-layout-variant="cockpit"] aside {
    margin-top: 0.25rem;
    margin-bottom: 1rem;
    border: 1px solid rgba(121, 136, 164, 0.2);
    border-radius: 24px;
    padding: 0.75rem;
    box-shadow: 0 18px 40px -34px rgba(23, 32, 51, 0.45);
  }

  :root[data-layout-variant="cockpit"] main {
    padding-top: 0.25rem;
  }

  :root[data-layout-variant="cockpit"] footer {
    color: #667085;
    background: rgba(250, 252, 255, 0.78);
    backdrop-filter: blur(16px);
  }

  :root[data-layout-variant="cockpit"] button,
  :root[data-layout-variant="cockpit"] input,
  :root[data-layout-variant="cockpit"] select {
    border-radius: 12px;
  }

  :root[data-layout-variant="cockpit"] [role="switch"] {
    width: 48px;
    height: 28px;
    padding: 3px;
    border-radius: 999px;
    border-color: rgba(121, 136, 164, 0.5);
    background: #e8edf5;
    box-shadow: inset 0 1px 2px rgba(23, 32, 51, 0.12);
  }

  :root[data-layout-variant="cockpit"] [role="switch"][aria-checked="true"] {
    border-color: rgba(62, 105, 255, 0.7);
    background: #3e69ff;
  }

  :root[data-layout-variant="cockpit"] [role="switch"] > span {
    width: 20px;
    height: 20px;
    border-radius: 999px;
    background: #ffffff !important;
    transform: translateX(0) !important;
    box-shadow: 0 2px 7px rgba(23, 32, 51, 0.22);
  }

  :root[data-layout-variant="cockpit"] [role="switch"][aria-checked="true"] > span {
    transform: translateX(20px) !important;
  }